## name: Liberty Hill Dusk
## author: Liberty Hill Studios
## license: MIT
## blurb: Texas Hill Country dusk - ink-dark surfaces, parchment text, gold and ember accents.

# Liberty Hill Dusk - kitty colour scheme
# Liberty Hill Studios . macOS port of the Windows Terminal scheme in
# <repo>/terminal/liberty-hill-dusk.json . palette is byte-identical.
#
# The `## name:` header above is kitty's theme-metadata convention (used by
# `kitty +kitten themes`); the rest of the file is ordinary kitty.conf syntax.
#
# INSTALL (reversible - one added line):
#     mkdir -p ~/.config/kitty
#     cp liberty-hill-dusk.kitty.conf ~/.config/kitty/
# then append ONE line to ~/.config/kitty/kitty.conf:
#     include liberty-hill-dusk.kitty.conf
# Relative includes resolve against the directory of the including file, so the
# bare filename is correct. Uninstall = delete that one line.
# Reload without restarting: ctrl+cmd+, (or restart kitty).
#
# PALETTE
#   ink-950 #0A0807   parchment #F5ECD9   gold-400 #E8A13A  gold-300 #ECBE5B
#   gold-600 #B3661F  ember-400 #D4542B   ember-300 #E57A53
# Design law: gold/ember are ACCENTS only. Tab bars and window borders keep
# dark surfaces; gold appears as text and thin edges, never as a fill.

# --- core surfaces ---------------------------------------------------------
background            #0A0807
foreground            #F5ECD9

# --- cursor (gold-400 block, ink-950 glyph punched through) ----------------
cursor                #E8A13A
cursor_text_color     #0A0807

# --- selection -------------------------------------------------------------
selection_background  #4D2C14
selection_foreground  #F5ECD9

# --- links -----------------------------------------------------------------
url_color             #ECBE5B

# --- window borders (thin lines only - accent is legal here) ---------------
active_border_color   #E8A13A
inactive_border_color #6F6557
bell_border_color     #D4542B

# --- tab bar (dark surfaces, gold only as TEXT on the active tab) ----------
active_tab_background   #1B1612
active_tab_foreground   #ECBE5B
inactive_tab_background #0A0807
inactive_tab_foreground #6F6557
tab_bar_background      #0A0807

# --- 16 ANSI colours -------------------------------------------------------
color0  #1B1612
color1  #E0604F
color2  #5FB87A
color3  #E8A13A
color4  #5AA8E0
color5  #A878D8
color6  #7FBFB4
color7  #CDBFA6

color8  #6F6557
color9  #E57A53
color10 #83C99B
color11 #ECBE5B
color12 #7DBDE8
color13 #C09BE8
color14 #9AD1C7
color15 #FDF6E8
